<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ร้านหมูทุบแม่บัวเผื่อน</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; padding-bottom: 90px; }

    /* Header */
    .header { background: #C0392B; color: #fff; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .header h1 { font-size: 18px; font-weight: bold; }
    .header p { font-size: 12px; color: #FFD0CC; margin-top: 2px; }

    /* Loading */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #C0392B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Category */
    .category { margin: 12px 12px 0; }
    .cat-title { background: #fff; border-radius: 10px 10px 0 0; padding: 12px 16px; font-weight: bold; font-size: 15px; color: #C0392B; border-bottom: 1px solid #f0f0f0; }

    /* Product row */
    .product { background: #fff; padding: 12px 16px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 12px; }
    .product:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
    .product-info { flex: 1; }
    .product-name { font-size: 14px; color: #1a1a1a; }
    .product-price { font-size: 13px; color: #C0392B; font-weight: bold; margin-top: 2px; }

    /* Qty control */
    .qty-control { display: flex; align-items: center; gap: 0; }
    .qty-btn { width: 32px; height: 32px; border: 2px solid #C0392B; background: #fff; color: #C0392B; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; }
    .qty-btn:active { background: #C0392B; color: #fff; transform: scale(0.9); }
    .qty-num { width: 36px; text-align: center; font-size: 16px; font-weight: bold; color: #1a1a1a; }
    .qty-num.active { color: #C0392B; }

    /* Bottom bar */
    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px 16px; box-shadow: 0 -2px 12px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; z-index: 100; }
    .total-info { flex: 1; }
    .total-label { font-size: 11px; color: #888; }
    .total-amount { font-size: 20px; font-weight: bold; color: #C0392B; }
    .order-btn { background: #C0392B; color: #fff; border: none; border-radius: 10px; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: opacity 0.1s; }
    .order-btn:disabled { background: #ccc; cursor: not-allowed; }
    .order-btn:active { opacity: 0.8; }

    /* Success */
    #success { display: none; flex-direction: column; align-items: center; justify-content: center; height: 60vh; gap: 16px; text-align: center; padding: 24px; }
    #success .icon { font-size: 64px; }
    #success h2 { font-size: 20px; color: #27AE60; }
    #success p { color: #555; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="header">
  <h1>🐷 ร้านหมูทุบแม่บัวเผื่อน</h1>
  <p>แม่บัวเผื่อน • ชุมพร • จัดส่งทั่วไทย</p>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:#888;font-size:14px;">กำลังโหลด...</p>
</div>

<div id="catalog" style="display:none;"></div>

<div id="success">
  <div class="icon">✅</div>
  <h2>ส่งออเดอร์แล้ว!</h2>
  <p>กรุณาพิมพ์ที่อยู่จัดส่งใน LINE chat<br>เพื่อดำเนินการต่อครับ 🙏</p>
</div>

<div class="bottom-bar" id="bottomBar" style="display:none;">
  <div class="total-info">
    <div class="total-label">รวมสินค้า</div>
    <div class="total-amount" id="totalAmount">0 บาท</div>
  </div>
  <button class="order-btn" id="orderBtn" onclick="submitOrder()" disabled>🛒 สั่งซื้อ</button>
</div>

<script>
const LIFF_ID = '2010237396-QOmKN3ML';

const MENU = [
  { category: '🐷 หมูทุบ', items: [
    { name: 'หมูทุบ 130g', price: 100 },
    { name: 'หมูทุบ 500g', price: 350 },
    { name: 'หมูทุบ 1000g', price: 700 },
  ]},
  { category: '🐷 หมูแท่ง', items: [
    { name: 'หมูแท่ง 130g', price: 100 },
    { name: 'หมูแท่ง 200g', price: 200 },
    { name: 'หมูแท่ง 500g', price: 350 },
  ]},
  { category: '🐷 หมูแผ่นกรอบ', items: [
    { name: 'หมูแผ่นกรอบ 130g', price: 100 },
  ]},
  { category: '🐷 หมูสวรรค์', items: [
    { name: 'หมูสวรรค์ 170g', price: 100 },
    { name: 'หมูสวรรค์ 350g', price: 200 },
    { name: 'หมูสวรรค์ 500g', price: 300 },
    { name: 'หมูสวรรค์ 1000g', price: 600 },
  ]},
  { category: '🐷 หมูฝอย', items: [
    { name: 'หมูฝอย 180g', price: 100 },
    { name: 'หมูฝอย 350g', price: 200 },
    { name: 'หมูฝอย 500g', price: 300 },
    { name: 'หมูฝอย 1000g', price: 600 },
  ]},
  { category: '🐷 ฝอยกรอบ', items: [
    { name: 'ฝอยกรอบ 170g', price: 100 },
    { name: 'ฝอยกรอบ 350g', price: 200 },
  ]},
  { category: '🐷 หมูหยอง', items: [
    { name: 'หมูหยอง 150g', price: 100 },
    { name: 'หมูหยอง 500g', price: 300 },
    { name: 'หมูหยอง 1000g', price: 600 },
  ]},
  { category: '🔥 สินค้าอื่นๆ', items: [
    { name: 'ปลาเก๋าปรุงรส 150g', price: 100 },
    { name: 'หมึกเชอรี่ 150g', price: 100 },
    { name: 'เชียงปลาสลิด 500g', price: 140 },
    { name: 'กุนเชียงหมู 500g', price: 140 },
  ]},
  { category: '🌶️ น้ำพริก', items: [
    { name: 'น้ำพริกกากหมู 200g', price: 100 },
    { name: 'น้ำพริกกากหมู 500g', price: 250 },
    { name: 'น้ำพริกแมงดา (เปียก)', price: 50 },
    { name: 'น้ำพริกตาแดง (เปียก)', price: 50 },
    { name: 'น้ำพริกปลาย่าง (เปียก)', price: 50 },
    { name: 'น้ำพริกเผากุ้ง (เปียก)', price: 50 },
    { name: 'น้ำพริกปลาสลิด', price: 50 },
    { name: 'น้ำพริกปลาดุกฟูผัดพริกขิง', price: 50 },
    { name: 'น้ำพริกหมูทุบ', price: 50 },
    { name: 'น้ำพริกปลาย่าง', price: 50 },
    { name: 'น้ำพริกนรกแมงดา (แห้ง)', price: 50 },
    { name: 'น้ำพริกนรกปลาย่าง (แห้ง)', price: 50 },
  ]},
  { category: '🦐 กะปิ & อื่นๆ', items: [
    { name: 'กะปิแท้ชุมพร', price: 70 },
    { name: 'กะปิกุ้งหวาน', price: 70 },
    { name: 'ขิงดอง 500g', price: 50 },
    { name: 'ไชโป๊แบบเส้น 400g', price: 50 },
    { name: 'ไชโป๊แบบแว่น 400g', price: 50 },
    { name: 'ไชโป๊แบบลูกเต๋า 400g', price: 50 },
  ]},
];

const qty = {}; // { itemName: quantity }
let userProfile = null;

function updateQty(name, price, delta) {
  qty[name] = Math.max(0, Math.min(10, (qty[name] || 0) + delta));
  document.getElementById('qty-' + btoa(unescape(encodeURIComponent(name)))).textContent = qty[name];
  const numEl = document.getElementById('qty-' + btoa(unescape(encodeURIComponent(name))));
  numEl.className = 'qty-num' + (qty[name] > 0 ? ' active' : '');
  updateTotal();
}

function updateTotal() {
  let total = 0;
  let count = 0;
  Object.entries(qty).forEach(([name, q]) => {
    if (q > 0) {
      const item = MENU.flatMap(c => c.items).find(i => i.name === name);
      if (item) { total += item.price * q; count += q; }
    }
  });
  document.getElementById('totalAmount').textContent = total.toLocaleString() + ' บาท';
  const btn = document.getElementById('orderBtn');
  btn.disabled = count === 0;
  btn.textContent = count > 0 ? `🛒 สั่งซื้อ (${count} ชิ้น)` : '🛒 สั่งซื้อ';
}

function buildCatalog() {
  const catalog = document.getElementById('catalog');
  catalog.innerHTML = MENU.map(cat => `
    <div class="category">
      <div class="cat-title">${cat.category}</div>
      ${cat.items.map(item => {
        const id = btoa(unescape(encodeURIComponent(item.name)));
        return `
          <div class="product">
            <div class="product-info">
              <div class="product-name">${item.name}</div>
              <div class="product-price">฿${item.price.toLocaleString()}</div>
            </div>
            <div class="qty-control">
              <div class="qty-btn" onclick="updateQty('${item.name.replace(/'/g,"\\'")}', ${item.price}, -1)">−</div>
              <div class="qty-num" id="qty-${id}">0</div>
              <div class="qty-btn" onclick="updateQty('${item.name.replace(/'/g,"\\'")}', ${item.price}, 1)">+</div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `).join('');
  document.getElementById('loading').style.display = 'none';
  catalog.style.display = 'block';
  document.getElementById('bottomBar').style.display = 'flex';
}

async function submitOrder() {
  const items = Object.entries(qty)
    .filter(([, q]) => q > 0)
    .map(([name, q]) => {
      const item = MENU.flatMap(c => c.items).find(i => i.name === name);
      return { name, price: item.price, qty: q };
    });

  if (items.length === 0) return;

  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังส่ง...';

  try {
    const res = await fetch('/api/liff-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: userProfile.userId,
        displayName: userProfile.displayName,
        items,
      }),
    });
    if (res.ok) {
      document.getElementById('catalog').style.display = 'none';
      document.getElementById('bottomBar').style.display = 'none';
      document.getElementById('success').style.display = 'flex';
      setTimeout(() => liff.closeWindow(), 3000);
    } else {
      throw new Error('server error');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '🛒 ลองใหม่';
    alert('เกิดข้อผิดพลาด กรุณาลองใหม่ครับ');
  }
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    userProfile = await liff.getProfile();
    buildCatalog();
  } catch (e) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#E74C3C;padding:24px;text-align:center;">เกิดข้อผิดพลาด<br>' + e.message + '</p>';
  }
}

init();
</script>
</body>
</html>
